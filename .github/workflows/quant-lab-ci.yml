name: Quant Lab CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  actions: read

concurrency:
  group: quant-lab-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Verify, smoke, and package evidence
    runs-on: ubuntu-latest
    env:
      PYTHONPYCACHEPREFIX: /tmp/quant-pycache
      QUANT_LAB_LIVE_TRADING_ENABLED: "false"
      QUANT_LAB_LIVE_TRADING_ACK: ""
      ALPACA_PAPER_TRADING_ENABLED: "false"
      ALPACA_PAPER_TRADING_ACK: ""
      GH_TOKEN: ${{ github.token }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install backend dependencies
        run: |
          python -m venv backend/.venv
          backend/.venv/bin/python -m pip install --upgrade pip
          backend/.venv/bin/python -m pip install -e "backend[dev]"

      - name: Install frontend dependencies
        run: npm ci --prefix frontend

      - name: Run release gate
        run: python3 scripts/release_gate.py --run-smoke --strict-external --check-gh-auth

      - name: Check latest release evidence
        if: always()
        run: python3 scripts/check_release_evidence.py --no-write

      - name: Upload verification summaries
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: quant-lab-verification
          path: artifacts/verification/
          if-no-files-found: warn

      - name: Upload smoke and drill artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: quant-lab-smoke-and-drill
          path: |
            artifacts/local-smoke/
            artifacts/ops-smoke/
            artifacts/crypto-drills/
          if-no-files-found: warn

      - name: Upload evidence packages
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: quant-lab-evidence-packages
          path: artifacts/evidence-packages/
          if-no-files-found: warn

      - name: Upload external readiness reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: quant-lab-external-readiness
          path: artifacts/external-readiness/
          if-no-files-found: warn

      - name: Upload release gate summaries
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: quant-lab-release-gate
          path: artifacts/release-gate/
          if-no-files-found: warn

      - name: Upload connected-runner handoff bundles
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: quant-lab-handoff-bundles
          path: artifacts/handoff-bundles/
          if-no-files-found: warn

      - name: Upload live beta archives
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: quant-lab-live-beta-archives
          path: artifacts/live-beta/
          if-no-files-found: warn
